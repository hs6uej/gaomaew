<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Pad 🎛️</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #805ad5;
            --primary-hover: #9f7aea;
            --bg: #1a202c;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f7fafc;
            --text-dim: #a0aec0;
            --accent: #4fd1c5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(128, 90, 213, 0.1) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 900px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .nav-btn {
            background: var(--glass);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .pad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .pad-btn {
            aspect-ratio: 1/1;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .pad-btn:active { transform: scale(0.95); }

        .pad-btn.has-sound {
            background: linear-gradient(135deg, rgba(128, 90, 213, 0.1), rgba(128, 90, 213, 0.3));
            border-color: var(--primary);
        }

        .pad-btn.playing {
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.05);
        }

        .pad-label {
            font-weight: 600;
            font-size: 1.1rem;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .edit-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 5px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .pad-btn:hover .edit-badge { opacity: 1; }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .mode-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mode-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: var(--bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal h2 { margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); }
        
        .modal input, .modal select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 8px; cursor: pointer; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 8px; cursor: pointer; }
        .btn-danger { background: #c53030; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="nav-btn">← Finder</a>
            <h1>Sound Pad</h1>
            <div class="mode-toggle">
                <button id="modePlay" class="mode-btn active">PLAY</button>
                <button id="modeEdit" class="mode-btn">EDIT</button>
            </div>
        </header>

        <div id="padGrid" class="pad-grid">
            <!-- 16 buttons will be injected here -->
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitle">Edit Pad Slot</h2>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="slotName" placeholder="Enter name...">
            </div>
            <div class="form-group">
                <label>Assign Sound (from History)</label>
                <select id="soundSelect">
                    <option value="">-- No Sound --</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-danger" id="btnClearSlot">Clear Slot</button>
                <div style="flex: 1"></div>
                <button class="btn-secondary" id="btnCancel">Cancel</button>
                <button class="btn-primary" id="btnSave">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'PLAY';
        let padData = [];
        let historyData = [];
        let editingSlotId = null;

        const padGrid = document.getElementById('padGrid');
        const modalOverlay = document.getElementById('modalOverlay');
        const soundSelect = document.getElementById('soundSelect');
        const slotNameInput = document.getElementById('slotName');

        async function init() {
            await Promise.all([loadPadData(), loadHistory()]);
            renderGrid();
            setupModeToggle();
        }

        async function loadPadData() {
            const res = await fetch('/api/pad');
            padData = await res.json();
            // Ensure we have 16 slots
            if (padData.length < 16) {
                for (let i = padData.length; i < 16; i++) {
                    padData.push({ id: i, name: `Slot ${i + 1}`, mp3: null });
                }
            }
        }

        async function loadHistory() {
            const res = await fetch('/api/history');
            historyData = await res.json();
            
            soundSelect.innerHTML = '<option value="">-- No Sound --</option>' + 
                historyData.map(item => `
                    <option value="${item.mp3}">${item.mp3.split('/').pop()} (${item.url.slice(0, 30)}...)</option>
                `).join('');
        }

        function renderGrid() {
            padGrid.innerHTML = padData.map(slot => `
                <div class="pad-btn ${slot.mp3 ? 'has-sound' : ''}" onclick="handlePadClick(${slot.id}, this)">
                    <span class="pad-label">${slot.name || 'Empty'}</span>
                    <span class="edit-badge">EDIT</span>
                </div>
            `).join('');
        }

        function setupModeToggle() {
            const playBtn = document.getElementById('modePlay');
            const editBtn = document.getElementById('modeEdit');

            playBtn.onclick = () => {
                currentMode = 'PLAY';
                playBtn.classList.add('active');
                editBtn.classList.remove('active');
                document.body.style.backgroundImage = 'radial-gradient(circle at 50% 50%, rgba(128, 90, 213, 0.1) 0%, transparent 50%)';
            };

            editBtn.onclick = () => {
                currentMode = 'EDIT';
                editBtn.classList.add('active');
                playBtn.classList.remove('active');
                document.body.style.backgroundImage = 'radial-gradient(circle at 50% 50%, rgba(79, 209, 197, 0.05) 0%, transparent 50%)';
            };
        }

        function handlePadClick(id, element) {
            const slot = padData.find(s => s.id === id);
            
            if (currentMode === 'EDIT') {
                openEditModal(slot);
            } else {
                if (slot.mp3) {
                    playSlot(slot, element);
                }
            }
        }

        function playSlot(slot, element) {
            const audio = new Audio(slot.mp3);
            audio.play().catch(e => alert('Cannot play audio. Link might be expired.'));
            
            element.classList.add('playing');
            audio.onended = () => element.classList.remove('playing');
            setTimeout(() => element.classList.remove('playing'), 500);
        }

        function openEditModal(slot) {
            editingSlotId = slot.id;
            slotNameInput.value = slot.name || '';
            soundSelect.value = slot.mp3 || '';
            modalOverlay.style.display = 'flex';
        }

        document.getElementById('btnCancel').onclick = () => {
            modalOverlay.style.display = 'none';
        };

        document.getElementById('btnClearSlot').onclick = () => {
            slotNameInput.value = `Slot ${editingSlotId + 1}`;
            soundSelect.value = '';
        };

        document.getElementById('btnSave').onclick = async () => {
            const slot = padData.find(s => s.id === editingSlotId);
            slot.name = slotNameInput.value;
            slot.mp3 = soundSelect.value;
            
            await savePadData();
            modalOverlay.style.display = 'none';
            renderGrid();
        };

        async function savePadData() {
            await fetch('/api/pad', {
                method: 'POST',
                body: JSON.stringify(padData),
                headers: { 'Content-Type': 'application/json' }
            });
        }

        init();
    </script>
</body>
</html>
